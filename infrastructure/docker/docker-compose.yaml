version: "3.8"

services:
  # -----------------------------------------
  # API Backend - Rust/Axum
  # -----------------------------------------
  api:
    build:
      context: ../..
      dockerfile: infrastructure/docker/production.Dockerfile
    container_name: monitoreo_api
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      RUST_LOG: info
    # Dejamos los puertos internos expuestos para Coolify, quitamos el mapeo directo al host
    expose:
      - "8000"
    networks:
      - coolify
    # Desactivamos healthcheck automático de docker para evitar falsos negativos en distroless
    healthcheck:
      disable: true

  # -----------------------------------------
  # Web Frontend - SvelteKit + Nginx
  # -----------------------------------------
  web:
    build:
      context: ../..
      dockerfile: infrastructure/docker/production.Dockerfile.web
    container_name: monitoreo_web
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - coolify
    depends_on:
      - api