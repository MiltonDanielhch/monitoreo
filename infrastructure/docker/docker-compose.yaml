# ==========================================
# Docker Compose para Producción - API + Web
# ==========================================

services:
  # -----------------------------------------
  # API Backend - Rust/Axum
  # -----------------------------------------
  api:
    build:
      context: ../..
      dockerfile: infrastructure/docker/production.Dockerfile
    container_name: monitoreo_api
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      RUST_LOG: info
    ports:
      - "3001:8000"
    networks:
      - coolify
    # Healthcheck usando wget al endpoint /health
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.monitoreo-api.rule=Host(`q134cgq11nmsrzqkh8040bny.190.129.54.198.sslip.io`)"
      - "traefik.http.services.monitoreo-api.loadbalancer.server.port=8000"

  # -----------------------------------------
  # Web Frontend - SvelteKit + Nginx
  # -----------------------------------------
  web:
    build:
      context: ../..
      dockerfile: infrastructure/docker/production.Dockerfile.web
    container_name: monitoreo_web
    restart: unless-stopped
    networks:
      - coolify
    # Healthcheck para nginx
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.monitoreo-web.rule=Host(`eq30msyqrc2nrzeqdyxv7ohb.190.129.54.198.sslip.io`)"
      - "traefik.http.services.monitoreo-web.loadbalancer.server.port=80"

# ==========================================
# Definición de la red de Coolify
# ==========================================
networks:
  coolify:
    external: true
    name: coolify